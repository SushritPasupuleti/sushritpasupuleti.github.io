<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Window background matching the site's titleBar colour -->
  <rect width="32" height="32" rx="5" fill="#1a1a2e"/>

  <!-- macOS traffic-light dots, same hex values used in index.tsx -->
  <circle cx="7"  cy="9" r="2.2" fill="#ff5f57"/>
  <circle cx="14" cy="9" r="2.2" fill="#febc2e"/>
  <circle cx="21" cy="9" r="2.2" fill="#28c840"/>

  <!-- Title-bar / content separator, matching the site's border colour -->
  <line x1="0" y1="14" x2="32" y2="14" stroke="#2a2a2a" stroke-width="0.8"/>

  <!-- Terminal prompt in the site's matrix green -->
  <text
    x="5" y="27"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    font-weight="bold"
    letter-spacing="-0.5"
    fill="#00ff41">&gt;_</text>
</svg>
